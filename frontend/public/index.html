<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />
        <meta name="description" content="Digital Gram Panchayat - Property & Tax Management System | Powered by AgroZone Technology Pvt. Ltd." />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet" />
        <!--
        manifest.json provides metadata used when your web app is installed on a
        user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
        -->
        <!--
        Notice the use of %PUBLIC_URL% in the tags above.
        It will be replaced with the URL of the `public` folder during the build.
        Only files inside the `public` folder can be referenced from the HTML.

        Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
        work correctly both with client-side routing and a non-root public URL.
        Learn how to configure a non-root public URL by running `npm run build`.
        -->
        <title>Digital Gram Panchayat | AgroZone Technology</title>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
        <!-- Copyright Footer -->
        <div
            id="agrozone-copyright"
            style="
                display: flex !important;
                box-sizing: border-box;
                padding: 6px 14px;
                align-items: center !important;
                justify-content: center !important;
                gap: 6px;
                border-radius: 50px !important;
                background: linear-gradient(135deg, #1a5d1a, #2e8b2e) !important;
                position: fixed !important;
                bottom: 16px;
                right: 16px;
                font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif !important;
                font-size: 11px !important;
                z-index: 9999 !important;
                box-shadow: 0 2px 12px rgba(0,0,0,0.15) !important;
                opacity: 0.92;
                transition: opacity 0.2s ease;
            "
            onmouseover="this.style.opacity='1'"
            onmouseout="this.style.opacity='0.92'"
        >
            <a href="https://www.agrozonetechnology.com/" target="_blank" rel="noopener noreferrer" style="color: #fff !important; text-decoration: none !important; cursor: pointer;">
                <span style="color: #fff !important; font-size: 11px !important; font-weight: 500 !important; letter-spacing: 0.3px; margin: 0 !important; white-space: nowrap !important;">
                    &copy; 2026 Powered by <strong style="font-weight: 700;">AgroZone Technology Pvt. Ltd.</strong>
                </span>
            </a>
        </div>
